 <body data-theme="dark">
  <script>
    // Restore SPA path after GitHub Pages 404 redirect
    (function() {
      var redirect = sessionStorage.getItem('spa-redirect');
      if (redirect) {
        sessionStorage.removeItem('spa-redirect');
        window.history.replaceState(null, '', '/app' + redirect);
      }
    })();
  </script>
