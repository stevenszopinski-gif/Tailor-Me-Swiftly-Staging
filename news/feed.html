<!DOCTYPE html>
<html lang="en">
<head>

  <meta http-equiv="refresh" content="0;url=briefing.html">
  <title>Redirecting…</title>
  <script>window.location.replace('briefing.html');</script>
</head>
<body data-theme="dark">
  <p>Redirecting to <a href="briefing.html">Briefing</a>…</p>
<script>
  // Theme persistence
  (function() {
    var t = localStorage.getItem('tms_theme_preference');
    if (t) { document.documentElement.setAttribute('data-theme', t); document.body.setAttribute('data-theme', t); }
  })();
  </script>
</body>
