<!DOCTYPE html>
<html>
<head>
  <meta name="description" content="TailorMeSwiftly browser extension — capture job descriptions from LinkedIn, Indeed, Greenhouse, and 8+ job boards, then tailor your resume instantly.">
  <title>TailorMeSwiftly</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { width:360px; background:#151821; color:rgba(255,255,255,0.9); font-family:'Segoe UI',system-ui,sans-serif; padding:1rem; }
    h2 { font-size:1rem; margin-bottom:0.75rem; display:flex; align-items:center; gap:0.5rem; }
    h2 span { color:#A3C4DC; }
    .status { background:rgba(0,0,0,0.3); border:1px dashed rgba(255,255,255,0.2); border-radius:4px; padding:0.75rem; margin:0.75rem 0; font-size:0.82rem; min-height:60px; max-height:200px; overflow-y:auto; line-height:1.5; color:rgba(255,255,255,0.6); white-space:pre-wrap; }
    .status.has-data { color:rgba(255,255,255,0.9); }
    .status.success { color:#10b981; border-color:rgba(16,185,129,0.3); }
    .status.error { color:#ef4444; border-color:rgba(239,68,68,0.3); }
    .btn { display:block; width:100%; padding:0.6rem; border:none; border-radius:4px; cursor:pointer; font-size:0.85rem; font-weight:600; margin-bottom:0.5rem; }
    .btn-primary { background:#A3C4DC; color:#151821; }
    .btn-primary:hover { background:#B8D5E9; }
    .btn-save { background:#3b82f6; color:#fff; }
    .btn-save:hover { background:#2563eb; }
    .btn-generate { background:#10b981; color:#fff; }
    .btn-generate:hover { background:#059669; }
    .btn-secondary { background:transparent; border:1px dashed rgba(255,255,255,0.3); color:#A3C4DC; }
    .btn-secondary:hover { border-color:#A3C4DC; }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-row { display:flex; gap:0.5rem; margin-bottom:0.5rem; }
    .btn-row .btn { margin-bottom:0; }
    .meta { font-size:0.75rem; color:rgba(255,255,255,0.4); margin-top:0.5rem; text-align:center; }
    .meta a { color:#A3C4DC; text-decoration:none; }
    .history-label { font-size:0.72rem; color:rgba(255,255,255,0.4); font-weight:600; margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.02em; }
    .history-item { font-size:0.78rem; color:rgba(255,255,255,0.7); padding:0.3rem 0.5rem; border-radius:3px; cursor:pointer; margin-bottom:0.2rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .history-item:hover { background:rgba(163,196,220,0.1); color:#A3C4DC; }

    /* Auth UI */
    .auth-section { margin-bottom:0.75rem; }
    .auth-section input { width:100%; padding:0.5rem 0.65rem; background:rgba(0,0,0,0.3); border:1px dashed rgba(255,255,255,0.2); border-radius:4px; color:rgba(255,255,255,0.9); font-size:0.82rem; margin-bottom:0.4rem; outline:none; }
    .auth-section input:focus { border-color:#A3C4DC; }
    .auth-section input::placeholder { color:rgba(255,255,255,0.3); }
    .user-bar { display:flex; align-items:center; justify-content:space-between; padding:0.4rem 0.5rem; background:rgba(16,185,129,0.08); border:1px dashed rgba(16,185,129,0.2); border-radius:4px; margin-bottom:0.75rem; font-size:0.75rem; }
    .user-bar .email { color:rgba(255,255,255,0.7); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px; }
    .user-bar .sign-out { color:#ef4444; cursor:pointer; font-weight:600; background:none; border:none; font-size:0.72rem; }
    .user-bar .sign-out:hover { text-decoration:underline; }
    .auth-error { color:#ef4444; font-size:0.75rem; margin-bottom:0.4rem; }
  </style>
</head>
<body>
  <h2><span>TMS</span> Job Capture</h2>

  <!-- Auth: Login Form (shown when logged out) -->
  <div id="auth-login" class="auth-section" style="display:none;">
    <input type="email" id="login-email" placeholder="Email" autocomplete="email" />
    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" />
    <div id="login-error" class="auth-error" style="display:none;"></div>
    <button class="btn btn-primary" id="login-btn">Sign In</button>
    <div style="display:flex; align-items:center; gap:0.5rem; margin:0.5rem 0;">
      <div style="flex:1; height:1px; background:rgba(255,255,255,0.15);"></div>
      <span style="font-size:0.7rem; color:rgba(255,255,255,0.3);">or</span>
      <div style="flex:1; height:1px; background:rgba(255,255,255,0.15);"></div>
    </div>
    <button class="btn btn-secondary" id="google-btn" style="display:flex; align-items:center; justify-content:center; gap:0.5rem;">
      <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>
    <p style="font-size:0.72rem; color:rgba(255,255,255,0.4); text-align:center; margin-top:0.4rem;">
      <a href="https://tailormeswiftly.com/app/signup" target="_blank" style="color:#A3C4DC; text-decoration:none;">Create account</a>
    </p>
  </div>

  <!-- Auth: User bar (shown when logged in) -->
  <div id="auth-user" class="user-bar" style="display:none;">
    <span class="email" id="user-email"></span>
    <button class="sign-out" id="sign-out-btn">Sign Out</button>
  </div>

  <!-- Main UI -->
  <button class="btn btn-primary" id="capture-btn">Capture Job Description</button>
  <div class="status" id="status">Click "Capture" on a job listing page to extract the job description.</div>

  <!-- Action buttons (shown after capture) -->
  <div id="action-buttons" style="display:none;">
    <div class="btn-row">
      <button class="btn btn-save" id="save-btn">Save to Tracker</button>
      <button class="btn btn-generate" id="tailor-btn">Tailor Now</button>
    </div>
    <button class="btn btn-secondary" id="bg-generate-btn" style="display:none;">Generate in Background</button>
  </div>

  <!-- Legacy: "Tailor Now" for non-authenticated users -->
  <button class="btn btn-generate" id="open-btn" style="display:none;">Tailor Now (Web)</button>

  <div id="capture-history" style="display:none; margin-top:0.75rem;"></div>
  <p class="meta">Supports LinkedIn, Indeed, Greenhouse, Lever, Glassdoor, Workday, iCIMS, SmartRecruiters, BambooHR, Ashby, Wellfound</p>

  <script src="supabase-auth.js"></script>
  <script src="api-client.js"></script>
  <script src="popup.js"></script>
</body>
</html>
